<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"></head>
<body>
<!-- 民宿定价数据看板 Widget 模板 -->
<!-- 通过 window.__WIDGET_DATA__ 接收动态数据 -->

<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --gap: 12px; }
  .dashboard { display: flex; flex-direction: column; gap: var(--gap); font-family: var(--font-family); color: var(--color-text); font-size: 14px; }
  .row { display: flex; gap: var(--gap); }
  .card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: 8px; padding: 16px; flex: 1; min-width: 0; }
  .card h3 { font-size: 13px; font-weight: 500; color: var(--color-text-muted); margin-bottom: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
  .kpi-row { display: flex; gap: var(--gap); }
  .kpi { flex: 1; text-align: center; padding: 12px 8px; background: var(--color-surface-elevated); border-radius: 6px; }
  .kpi .val { font-size: 24px; font-weight: 600; color: var(--color-accent); }
  .kpi .label { font-size: 11px; color: var(--color-text-muted); margin-top: 4px; }
  .kpi .change { font-size: 11px; margin-top: 2px; }
  .change.up { color: var(--color-success); }
  .change.down { color: var(--color-danger); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 8px 6px; color: var(--color-text-muted); font-weight: 500; font-size: 11px; border-bottom: 1px solid var(--color-border); }
  td { padding: 8px 6px; border-bottom: 1px solid var(--color-border); }
  tr:last-child td { border-bottom: none; }
  .tag { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 500; }
  .tag-up { background: rgba(22,163,74,0.12); color: var(--color-success); }
  .tag-down { background: rgba(225,29,72,0.12); color: var(--color-danger); }
  .tag-keep { background: rgba(37,99,235,0.12); color: var(--color-info); }
  .tag-warn { background: rgba(217,119,6,0.12); color: var(--color-warning); }
  .btn { padding: 6px 14px; border: none; border-radius: 6px; font-size: 12px; font-weight: 500; cursor: pointer; }
  .btn-primary { background: var(--color-accent); color: var(--color-accent-text); }
  .btn-ghost { background: transparent; color: var(--color-accent); border: 1px solid var(--color-border); }
  .btn:hover { opacity: 0.85; }
  .confidence { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 4px; }
  .conf-high { background: var(--color-success); }
  .conf-mid { background: var(--color-warning); }
  .conf-low { background: var(--color-danger); }
  .chart-wrap { position: relative; width: 100%; }
  .competitor-name { max-width: 100px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .detail-link { color: var(--color-accent-light); cursor: pointer; font-size: 12px; text-decoration: underline; }
  .alert-bar { background: rgba(217,119,6,0.08); border: 1px solid rgba(217,119,6,0.25); border-radius: 6px; padding: 10px 14px; display: flex; align-items: center; gap: 8px; font-size: 13px; }
  .alert-bar .icon { color: var(--color-warning); font-size: 16px; }
</style>

<div class="dashboard" id="app"></div>

<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
(function() {
  const D = window.__WIDGET_DATA__ || {
    kpis: {
      adr: { value: 488, change: '+5.2%', direction: 'up' },
      occ: { value: 72, change: '+3.1%', direction: 'up', suffix: '%' },
      revpar: { value: 351, change: '+8.5%', direction: 'up' },
      compAvg: { value: 512, change: '-2.3%', direction: 'down' }
    },
    suggestions: [
      { room: '山景大床房', platform: '全平台', current: 488, suggested: 538, change: '+10.2%', direction: 'up', confidence: 'high', roomKey: 'mountain' },
      { room: '亲子家庭房', platform: '美团', current: 568, suggested: 528, change: '-7.0%', direction: 'down', confidence: 'mid', roomKey: 'family' },
      { room: '湖景套房', platform: '携程', current: 688, suggested: 758, change: '+10.2%', direction: 'up', confidence: 'mid', roomKey: 'lake' }
    ],
    competitors: [
      { name: '云栖山居', platform: '携程', room: '山景大床', price: 528, rating: 4.7, promo: '无' },
      { name: '溪谷民宿', platform: '美团', room: '亲子房', price: 499, rating: 4.5, promo: '满减20' },
      { name: '湖畔小筑', platform: '飞猪', room: '湖景房', price: 698, rating: 4.8, promo: '连住9折' },
      { name: '山间雅舍', platform: '携程', room: '大床房', price: 458, rating: 4.3, promo: '新客8折' },
      { name: '绿野仙踪', platform: 'Airbnb', room: '整套', price: 580, rating: 4.9, promo: '无' }
    ],
    factors: [
      { name: '成本底线', value: '¥280/晚', impact: '利润率42.6%', impactTag: 'keep', weight: '20%' },
      { name: '竞品中位价', value: '¥528', impact: '我方低于市场', impactTag: 'up', weight: '25%' },
      { name: '预测入住率', value: '78%', impact: '供不应求', impactTag: 'up', weight: '25%' },
      { name: '距入住天数', value: '12天', impact: '时间充裕', impactTag: 'keep', weight: '15%' },
      { name: '渠道差异', value: '美团偏低', impact: '需关注', impactTag: 'warn', weight: '15%' }
    ],
    compChart: {
      labels: ['山景大床房', '亲子家庭房', '湖景套房'],
      mine: [488, 568, 688],
      compAvg: [493, 499, 738],
      compMax: [528, 580, 798]
    },
    occChart: {
      data: [58,62,55,60,65,72,78,75,70,68,74,80,76,72],
      target: 70
    },
    alertCount: 3
  };

  const cs = getComputedStyle(document.documentElement);
  const muted = cs.getPropertyValue('--color-text-muted').trim();
  const border = cs.getPropertyValue('--color-border').trim();
  const accent = cs.getPropertyValue('--color-accent').trim();
  const success = cs.getPropertyValue('--color-success').trim();

  const kpi = D.kpis;
  const sugRows = D.suggestions.map(s => {
    const dir = s.direction === 'up' ? 'tag-up' : 'tag-down';
    const conf = s.confidence === 'high' ? 'conf-high' : s.confidence === 'mid' ? 'conf-mid' : 'conf-low';
    const confLabel = s.confidence === 'high' ? '高' : s.confidence === 'mid' ? '中' : '低';
    return '<tr><td>'+s.room+'</td><td>'+s.platform+'</td><td>¥'+s.current+'</td><td>¥'+s.suggested+'</td><td><span class="tag '+dir+'">'+s.change+'</span></td><td><span class="confidence '+conf+'"></span>'+confLabel+'</td><td><span class="detail-link" data-room="'+s.roomKey+'">详情</span></td></tr>';
  }).join('');

  const compRows = D.competitors.map(c => '<tr><td class="competitor-name">'+c.name+'</td><td>'+c.platform+'</td><td>'+c.room+'</td><td>¥'+c.price+'</td><td>'+c.rating+'</td><td>'+c.promo+'</td></tr>').join('');

  const facRows = D.factors.map(f => '<tr><td>'+f.name+'</td><td>'+f.value+'</td><td><span class="tag tag-'+f.impactTag+'">'+f.impact+'</span></td><td>'+f.weight+'</td></tr>').join('');

  const kpiDir = (d) => d === 'up' ? 'up' : 'down';
  const kpiArrow = (d) => d === 'up' ? '&#9650;' : '&#9660;';
  const kpiSuffix = (s) => s || '';

  document.getElementById('app').innerHTML = `
    <div class="alert-bar">
      <span class="icon">&#9888;</span>
      <span>检测到${D.alertCount}条调价建议待处理 — 竞品价格变动较大，建议尽快审核</span>
      <span style="flex:1"></span>
      <button class="btn btn-primary" id="btnApply">一键审核</button>
    </div>
    <div class="kpi-row">
      <div class="kpi"><div class="val">¥${kpi.adr.value}</div><div class="label">日均房价 ADR</div><div class="change ${kpiDir(kpi.adr.direction)}">${kpiArrow(kpi.adr.direction)} ${kpi.adr.change} vs上周</div></div>
      <div class="kpi"><div class="val">${kpi.occ.value}${kpi.occ.suffix||''}</div><div class="label">入住率 OCC</div><div class="change ${kpiDir(kpi.occ.direction)}">${kpiArrow(kpi.occ.direction)} ${kpi.occ.change} vs上周</div></div>
      <div class="kpi"><div class="val">¥${kpi.revpar.value}</div><div class="label">收益指数 RevPAR</div><div class="change ${kpiDir(kpi.revpar.direction)}">${kpiArrow(kpi.revpar.direction)} ${kpi.revpar.change} vs上周</div></div>
      <div class="kpi"><div class="val">¥${kpi.compAvg.value}</div><div class="label">竞品均价</div><div class="change ${kpiDir(kpi.compAvg.direction)}">${kpiArrow(kpi.compAvg.direction)} ${kpi.compAvg.change} vs上周</div></div>
    </div>
    <div class="row">
      <div class="card" style="flex:3"><h3>竞品价格对比</h3><div class="chart-wrap"><canvas id="compChart" style="width:100%;max-height:260px"></canvas></div></div>
      <div class="card" style="flex:2"><h3>入住率趋势 (近14天)</h3><div class="chart-wrap"><canvas id="occChart" style="width:100%;max-height:260px"></canvas></div></div>
    </div>
    <div class="row">
      <div class="card" style="flex:1"><h3>今日调价建议</h3><table><thead><tr><th>房型</th><th>平台</th><th>现价</th><th>建议价</th><th>幅度</th><th>置信度</th><th></th></tr></thead><tbody>${sugRows}</tbody></table></div>
    </div>
    <div class="row">
      <div class="card" style="flex:1"><h3>竞品价格明细</h3><table><thead><tr><th>竞品</th><th>平台</th><th>房型</th><th>价格</th><th>评分</th><th>促销</th></tr></thead><tbody>${compRows}</tbody></table></div>
      <div class="card" style="flex:1"><h3>供需因子分析</h3><table><thead><tr><th>因子</th><th>当前值</th><th>影响</th><th>权重</th></tr></thead><tbody>${facRows}</tbody></table></div>
    </div>
  `;

  new Chart(document.getElementById('compChart'), {
    type: 'bar',
    data: {
      labels: D.compChart.labels,
      datasets: [
        { label: '我方价格', data: D.compChart.mine, backgroundColor: accent, borderRadius: 4, barPercentage: 0.6 },
        { label: '竞品均价', data: D.compChart.compAvg, backgroundColor: 'rgba(124,58,237,0.45)', borderRadius: 4, barPercentage: 0.6 },
        { label: '竞品最高', data: D.compChart.compMax, backgroundColor: 'rgba(13,148,136,0.4)', borderRadius: 4, barPercentage: 0.6 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: muted, padding: 16, font: { size: 11 } } } },
      scales: {
        y: { beginAtZero: false, min: 300, grid: { color: border }, ticks: { color: muted, callback: v => '¥' + v } },
        x: { grid: { display: false }, ticks: { color: muted } }
      }
    }
  });

  const occLabels = Array.from({length: 14}, (_, i) => { const d = new Date(); d.setDate(d.getDate() - 13 + i); return (d.getMonth()+1) + '/' + d.getDate(); });
  new Chart(document.getElementById('occChart'), {
    type: 'line',
    data: {
      labels: occLabels,
      datasets: [
        { label: '实际入住率', data: D.occChart.data, borderColor: accent, backgroundColor: 'rgba(37,99,235,0.08)', tension: 0.4, fill: true, pointRadius: 3 },
        { label: '目标线 (' + D.occChart.target + '%)', data: Array(14).fill(D.occChart.target), borderColor: success, borderDash: [6, 4], pointRadius: 0, borderWidth: 1.5 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { position: 'bottom', labels: { color: muted, padding: 16, font: { size: 11 } } } },
      scales: {
        y: { min: 40, max: 100, grid: { color: border }, ticks: { color: muted, callback: v => v + '%' } },
        x: { grid: { display: false }, ticks: { color: muted, maxRotation: 0, font: { size: 10 } } }
      }
    }
  });

  document.querySelectorAll('.detail-link').forEach(el => {
    el.addEventListener('click', () => {
      const room = el.dataset.room;
      const roomNames = { mountain: '山景大床房', family: '亲子家庭房', lake: '湖景套房' };
      window.sendToAgent({ action: '查看调价详情', roomType: roomNames[room] || room, skill: 'homestay-pricing' });
    });
  });

  document.getElementById('btnApply').addEventListener('click', () => {
    window.sendToAgent({ action: '批量审核调价建议', skill: 'homestay-pricing', suggestions: D.alertCount });
  });
})();
</script>
</body>
</html>
